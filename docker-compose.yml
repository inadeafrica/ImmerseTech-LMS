services:
  mariadb:
    image: bitnami/mariadb:11.4
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-changeme}
      MARIADB_USER: ${MOODLE_DATABASE_USER:-bn_moodle}
      MARIADB_PASSWORD: ${MOODLE_DATABASE_PASSWORD:-changeme}
      MARIADB_DATABASE: ${MOODLE_DATABASE_NAME:-bitnami_moodle}
    volumes:
      - mariadb_data:/bitnami/mariadb
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MARIADB_ROOT_PASSWORD:-changeme}"]
      interval: 10s
      timeout: 5s
      retries: 10

  moodle:
    image: bitnami/moodle:5
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    ports:
      - "${MOODLE_HTTP_PORT:-8080}:8080"
      - "${MOODLE_HTTPS_PORT:-8443}:8443"
    environment:
      MOODLE_DATABASE_HOST: mariadb
      MOODLE_DATABASE_USER: ${MOODLE_DATABASE_USER:-bn_moodle}
      MOODLE_DATABASE_PASSWORD: ${MOODLE_DATABASE_PASSWORD:-changeme}
      MOODLE_DATABASE_NAME: ${MOODLE_DATABASE_NAME:-bitnami_moodle}
      MOODLE_USERNAME: ${MOODLE_ADMIN_USER:-admin}
      MOODLE_PASSWORD: ${MOODLE_ADMIN_PASSWORD:-changeme}
      MOODLE_EMAIL: ${MOODLE_ADMIN_EMAIL:-admin@immersetech.example}
      MOODLE_SITE_NAME: ${MOODLE_SITE_NAME:-ImmerseTech LMS}
      MOODLE_LANG: ${MOODLE_LANG:-en}
    volumes:
      - moodle_data:/bitnami/moodle
      - moodledata_data:/bitnami/moodledata
      # Custom add-on plugins land here as they're built — see plugins/README.md
      # for the planned mount points. Deliberately not bind-mounted yet: an
      # incomplete plugin directory (missing version.php etc.) makes Moodle's
      # plugin scanner fail, which would break this base install.
      - ./plugins/local/vrtracking:/bitnami/moodle/local/vrtracking

volumes:
  mariadb_data:
  moodle_data:
  moodledata_data:
